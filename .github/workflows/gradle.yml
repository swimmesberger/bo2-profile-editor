name: CI Build

on:
  push:
    tags: ["v*"]
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Native (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: bl2-macos-arm64
            binary: bl2
          - os: windows-2022
            artifact_name: bl2-windows-x64
            binary: bl2.exe
          - os: ubuntu-latest
            artifact_name: bl2-linux-x64
            binary: bl2

    steps:
      - uses: actions/checkout@v7

      - name: Setup GraalVM JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: graalvm
          java-version: '21'

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build native image
        run: ./gradlew nativeCompile

      - name: Upload native binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: build/native/nativeCompile/${{ matrix.binary }}

      - name: Create macOS app bundle
        if: runner.os == 'macOS'
        run: ./gradlew createMacApp

      - name: Zip macOS app bundle
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos-app/BL2ProfileEditor.app \
            build/macos-app/BL2ProfileEditor.zip

      - name: Upload macOS app bundle artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-app
          path: build/macos-app/BL2ProfileEditor.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read release notes from tag
        id: notes
        run: |
          notes="$(git for-each-ref "refs/tags/${{ github.ref_name }}" --format='%(contents)')"
          : "${notes:=Release ${{ github.ref_name }}}"
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Prepare release assets
        run: |
          cp dist/bl2-macos-arm64-app/BL2ProfileEditor.zip  dist/BL2ProfileEditor-macos-arm64.zip
          cp dist/bl2-windows-x64/bl2.exe                   dist/bl2-windows-x64.exe
          cp dist/bl2-linux-x64/bl2                         dist/bl2-linux-x64-bin
          chmod +x dist/bl2-linux-x64-bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ${{ steps.notes.outputs.notes }}

            ## Downloads

            | Platform | Download |
            |---|---|
            | macOS (Apple Silicon) | `BL2ProfileEditor-macos-arm64.zip` — drag to Applications |
            | Windows x64 | `bl2-windows-x64.exe` |
            | Linux x64 | `bl2-linux-x64-bin` |

            > **First time on macOS?** Right-click the `.app` → Open to bypass Gatekeeper on the first launch.
          files: |
            dist/BL2ProfileEditor-macos-arm64.zip
            dist/bl2-windows-x64.exe
            dist/bl2-linux-x64-bin
